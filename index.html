<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lindsay Lee — Product Designer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&family=Inclusive+Sans:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/typography.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/sections/nav.css" />
  </head>
  <body>
    <header class="site-header" data-site-header>
      <div class="site-header__start">
        <button
          class="icon-btn site-header__menu-toggle"
          type="button"
          data-nav-toggle
          aria-expanded="false"
          aria-controls="nav-overlay"
          aria-label="Open menu"
        >
          <span class="menu-icon" aria-hidden="true">
            <span class="menu-icon__line"></span>
            <span class="menu-icon__line"></span>
            <span class="menu-icon__line"></span>
          </span>
        </button>
      </div>

      <div class="site-header__end">
        <nav class="nav-links site-header__nav-desktop" aria-label="Primary">
          <a class="nav-link" href="#about">About</a>
          <a class="nav-link" href="#work">Work</a>
          <a class="nav-link" href="#side">Side</a>
          <a
            class="nav-link nav-link--external"
            href="https://drive.google.com/file/d/1mQqWUtJsV2n5Tk-uJDFnfsV9eOMg8I_J/view"
            target="_blank"
            rel="noopener noreferrer"
            >Resume</a
          >
          <a class="nav-link" href="#contact">Contact</a>
        </nav>

        <button
          class="sound-toggle"
          type="button"
          data-sound-toggle
          aria-pressed="false"
          aria-label="Sound off"
          title="Sound (coming soon)"
        >
          <img
            class="sound-toggle__img sound-toggle__img--off"
            src="assets/icon-sound-off.svg"
            alt=""
            width="18"
            height="18"
            data-sound-off
          />
          <img
            class="sound-toggle__img sound-toggle__img--on"
            src="assets/icon-sound-on.svg"
            alt=""
            width="18"
            height="18"
            hidden
            data-sound-on
          />
        </button>
      </div>
    </header>

    <div
      class="nav-overlay"
      id="nav-overlay"
      data-nav-overlay
      aria-hidden="true"
    >
      <nav class="nav-overlay__nav" aria-label="Mobile">
        <ul class="nav-overlay__list">
          <li>
            <a class="nav-overlay__link" href="#about" data-nav-overlay-link>About</a>
          </li>
          <li>
            <a class="nav-overlay__link" href="#work" data-nav-overlay-link>Work</a>
          </li>
          <li>
            <a class="nav-overlay__link" href="#side" data-nav-overlay-link>Side</a>
          </li>
          <li>
            <a
              class="nav-overlay__link"
              href="https://drive.google.com/file/d/1mQqWUtJsV2n5Tk-uJDFnfsV9eOMg8I_J/view"
              target="_blank"
              rel="noopener noreferrer"
              data-nav-overlay-link
              >Resume</a
            >
          </li>
          <li>
            <a class="nav-overlay__link" href="#contact" data-nav-overlay-link>Contact</a>
          </li>
        </ul>
      </nav>
    </div>

    <main>
      <div class="page-spacer" aria-hidden="true">
        <p class="type-meta-secondary">Nav verification spacer — scroll to test sticky header.</p>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
